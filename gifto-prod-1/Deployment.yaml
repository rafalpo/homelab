---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gifto-prod-1
  namespace: gifto-prod-1
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    app: gifto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gifto
  template:
    metadata:
      labels:
        app: gifto
    spec:
      imagePullSecrets:
        - name: nexus-secret
      containers:
      - name: frontend
        image: nexus3.prod-1.dev-software.pl:5001/gifto/gifto:latest
        imagePullPolicy: Always
        envFrom:
          - secretRef:
              name: gifto-secrets
          - configMapRef:
              name: gifto-config
        ports:
        - containerPort: 3000
          name: http
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
