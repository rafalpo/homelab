---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-prod-1-dev-software-prod-certificate
  namespace: cert-manager-prod-1
spec:
  secretName: cert-manager-prod-1-dev-software-prod-secret
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "traefik-prod-1,gift-exchange"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  issuerRef:
    name: cert-manager-prod-1-letsencrypt-prod-issuer
    kind: Issuer
  commonName: "*.prod-1.dev-software.pl"
  dnsNames:
    - "prod-1.dev-software.pl"
    - "*.prod-1.dev-software.pl"
