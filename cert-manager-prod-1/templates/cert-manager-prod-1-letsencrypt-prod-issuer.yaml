apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cert-manager-prod-1-letsencrypt-prod-issuer
  namespace: cert-manager-prod-1
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: <path:secret/data/cert-manager/prod-1#CF_EMAIL>
    privateKeySecretRef:
      name: cert-manager-prod-1-letsencrypt-prod-issuer
    solvers:
    - dns01:
        cloudflare:
          email: <path:secret/data/cert-manager/prod-1#CF_EMAIL>
          apiTokenSecretRef:
            name: cert-manager-prod-1-cloudflare-token-secret
            key: CF_TOKEN
      selector:
        dnsZones: <path:secret/data/cert-manager/prod-1#DOMAINS>
