apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cert-manager-prod-1-letsencrypt-prod-issuer
  namespace: cert-manager-prod-1
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${CF_EMAIL}
    privateKeySecretRef:
      name: cert-manager-prod-1-letsencrypt-prod-issuer
    solvers:
    - dns01:
        cloudflare:
          email: ${CF_EMAIL}
          apiTokenSecretRef:
            name: cert-manager-prod-1-cloudflare-token-secret
            key: cloudflare-token
      selector:
        dnsZones:
          - "dev-software.pl"
          - "*.dev-software.pl"
          - "prod-1.dev-software.pl"
          - "*.prod-1.dev-software.pl"
