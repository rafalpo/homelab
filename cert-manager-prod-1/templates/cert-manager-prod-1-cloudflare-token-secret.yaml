---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-credentials
  namespace: cert-manager-prod-1
spec:
  refreshInterval: "6h" 
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: cert-manager-prod-1-cloudflare-token-secret
    creationPolicy: Owner
  data:
    - secretKey: CF_TOKEN
      remoteRef:
        key: cert-manager/prod-1
        property: CF_TOKEN
    - secretKey: CF_EMAIL
      remoteRef:
        key: cert-manager/prod-1
        property: CF_EMAIL
    - secretKey: DOMAINS
      remoteRef:
        key: cert-manager/prod-1
        property: DOMAINS
    - secretKey: COMMON_NAME
      remoteRef:
        key: cert-manager/prod-1
        property: COMMON_NAME
